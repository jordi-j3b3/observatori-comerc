name: Mantenir l'app Streamlit desperta

on:
  schedule:
    - cron: '0 7,19 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Visit app and wake if sleeping
        run: |
          python <<'PY'
          import re
          from playwright.sync_api import sync_playwright, TimeoutError as PWTimeout

          URL = "https://observatori-comerc.streamlit.app/"
          WAKE_RE = re.compile(r"get this app back up", re.I)

          with sync_playwright() as p:
              browser = p.chromium.launch()
              page = browser.new_page()
              page.goto(URL, wait_until="domcontentloaded", timeout=60000)

              wake_btn = page.get_by_role("button", name=WAKE_RE)
              try:
                  wake_btn.wait_for(state="visible", timeout=8000)
                  print("Sleep banner detected; clicking wake button.")
                  wake_btn.click()
                  page.wait_for_timeout(90000)
                  still_sleeping = wake_btn.is_visible()
                  print(f"After 90s wait — sleep banner still visible: {still_sleeping}")
              except PWTimeout:
                  print("No sleep banner. App was already awake.")

              browser.close()
          PY
