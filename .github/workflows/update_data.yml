name: Actualitzacio trimestral de dades                                                                                                                          
                                                            
  on:                                                                                                                                                              
    schedule:                                               
      - cron: '0 8 1 1,4,7,10 *'
    workflow_dispatch:                                                                                                                                             
  
  jobs:                                                                                                                                                            
    update-data:                                            
      runs-on: ubuntu-latest                                                                                                                                       
  
      steps:                                                                                                                                                       
        - name: Checkout repo                               
          uses: actions/checkout@v4

        - name: Setup Python                                                                                                                                       
          uses: actions/setup-python@v5
          with:                                                                                                                                                    
            python-version: '3.11'                          

        - name: Install dependencies
          run: |
            pip install -r requirements.txt
            pip install openpyxl
                                                                                                                                                                   
        - name: Fetch and process data
          run: |                                                                                                                                                   
            cd $GITHUB_WORKSPACE                            
            python -c "                                                                                                                                            
            import sys
            sys.path.insert(0, '.')                                                                                                                                
            from data.processor import process_all          
            process_all()                                                                                                                                          
            "
                                                                                                                                                                   
        - name: Commit updated data                         
          run: |
            git config user.name 'github-actions[bot]'
            git config user.email 'github-actions[bot]@users.noreply.github.com'                                                                                   
            git add data/cache/*.csv data/cache/last_update.txt
            git diff --staged --quiet || git commit -m "Actualitzacio trimestral de dades $(date +%Y-%m-%d)"                                                       
            git push       
